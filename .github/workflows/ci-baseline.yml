name: CI Baseline

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  baseline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Node dependencies
        run: npm ci

      - name: Build static site
        env:
          PUBLIC_SITE_URL: https://phys-math.dev
          PUBLIC_MEDIA_BASE_URL: https://media.phys-math.dev
        run: npm run build

      - name: Compile-check Python scripts
        run: python -m py_compile scripts/*.py
